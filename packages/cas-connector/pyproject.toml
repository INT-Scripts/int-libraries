[project]
name = "cas-connector"
version = "0.1.0"
description = "CAS Authentication Client for IMT-BS/TSP"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "beautifulsoup4>=4.14.3",
    "requests>=2.32.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cas_connector"]
