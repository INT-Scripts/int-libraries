[project]
name = "laverint"
version = "0.1.0"
description = "Campus laundry tracking"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "requests",
    "beautifulsoup4",
]

[project.scripts]
laverint = "laverint.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/laverint"]
